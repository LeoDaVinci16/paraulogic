<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Anti-Paraulògic Honeycomb</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* --- Page setup --- */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f6fa;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 90%;
    max-width: 500px;
    min-width: 300px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    padding: 2rem;
    text-align: center;
}

.logo {
    max-width: 180px;
    height: auto;
    margin: 0 auto 1rem auto;
}

h1 {
    color: #ec4a49;
    font-size: 2rem;
    margin: 0.5rem 0 1rem 0;
}

p {
    color: #666;
    font-size: 1rem;
    margin-bottom: 1rem;
}

/* --- Input --- */
input {
    width: 80%;
    max-width: 100%;
    padding: 0.75rem;
    font-size: 1rem;
    border-radius: 8px;
    border: 2px solid #63bcca;
    margin-bottom: 1rem;
    text-align: center;
}

input:focus {
    outline: none;
    border-color: #ec4a49;
}

/* --- Button styles --- */
button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #63bcca;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #ec4a49;
}

/* --- Honeycomb --- */
.hex-container {
    position: relative;
    width: 240px;
    height: 210px;
    margin: 2rem auto;
}

.hex {
    width: 60px;
    height: 60px;
    background-color: #63bcca;
    clip-path: polygon(
        50% 0%, 100% 25%, 100% 75%, 
        50% 100%, 0% 75%, 0% 25%
    );
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 1.5rem;
    font-weight: bold;
    position: absolute;
}

.hex span {
    text-transform: uppercase;
    font-weight: normal;
    display: inline-block;
}

/* Letter colors based on hex type */
.hex.blue span {
    color: black;   /* side hexes */
}

.hex.red span {
    color: white;   /* central hex */
}

/* Central hexagon */
#hex-center {
    background-color: #ec4a49;
    top: 75px;
    left: 90px;
}

/* Surrounding hexes perfectly spaced */
#hex1 { top: 20px;   left: 50px; }
#hex2 { top: 20px;   left: 130px; }
#hex3 { top: 75px;  left: 10px; }
#hex4 { top: 75px;  left: 170px; }
#hex5 { top: 130px; left: 50px; }
#hex6 { top: 130px; left: 130px; }

/* Results (for later use) */
#count {
    margin-top: 1.5rem;
    font-weight: normal;
    color: black;
}

#result {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
}

.word {
    background: #63bcca;
    color: white;
    padding: 0.4rem 0.75rem;
    border-radius: 20px;
    font-size: 0.9rem;
    word-break: break-word;
}

/* Responsive */
@media (max-width: 600px) {
    .hex-container {
        width: 80vw;
        height: calc(80vw * 0.875);
        max-width: 240px;
        max-height: 210px;
    }
    .hex {
        width: 22%;
        aspect-ratio: 1;
        font-size: 5vw;
    }

    #hex-center { top: 60px; left: 70px; }
    #hex1 { top: 15px; left: 30px; }
    #hex2 { top: 15px; left: 110px; }
    #hex3 { top: 60px; left: 0px; }
    #hex4 { top: 60px; left: 140px; }
    #hex5 { top: 105px; left: 30px; }
    #hex6 { top: 105px; left: 110px; }
}
</style>
</head>

<body>
<div class="container">
    <img src="logo.png" alt="Paraulogic Logo" class="logo">
    <h1>Anti-Paraulògic</h1>
    <p>Introdueix les 7 lletres del dia (la primera és la central)</p>
    <input id="letters" placeholder="ex: rosupd" maxlength="7">

    <div class="hex-container">
        <div class="hex blue" id="hex1"><span></span></div>
        <div class="hex blue" id="hex2"><span></span></div>
        <div class="hex blue" id="hex3"><span></span></div>
        <div class="hex red" id="hex-center"><span></span></div>
        <div class="hex blue" id="hex4"><span></span></div>
        <div class="hex blue" id="hex5"><span></span></div>
        <div class="hex blue" id="hex6"><span></span></div>
    </div>

    <button onclick="solve()">Resoldre</button>
    <p id="count"></p>
    <div id="result"></div>
</div>

<script>
// --- Hex autofill ---
const hexOrder = [
    'hex-center', 'hex1', 'hex2', 'hex3', 'hex4', 'hex5', 'hex6'
];

const input = document.getElementById('letters');

input.addEventListener('input', () => {
    const letters = input.value.toLowerCase().split('');
    hexOrder.forEach((hexId, index) => {
        const span = document.getElementById(hexId).querySelector('span');
        span.textContent = letters[index] || '';
    });
});

// --- Dictionary and solver ---
let dictionary = [];

async function loadDictionary() {
    try {
        const response = await fetch("DISC2-LP.txt");
        const text = await response.text();
        dictionary = text
            .split("\n")
            .map(w => w.trim().toLowerCase())
            .filter(w => w.length > 0);
    } catch (e) {
        alert("Error carregant el diccionari. Obre el servidor localment!");
    }
}

async function solve() {
    if (dictionary.length === 0) {
        await loadDictionary();
    }

    const letters = input.value.toLowerCase().split('');
    if (letters.length < 1) {
        alert("Introdueix les lletres!");
        return;
    }

    const central = letters[0];
    const results = [];

    for (let word of dictionary) {
        if (!/^[a-zà-ú]+$/.test(word)) continue;
        if (!word.includes(central)) continue;

        let valid = true;
        for (let char of word) {
            if (!letters.includes(char)) {
                valid = false;
                break;
            }
        }
        if (valid) results.push(word);
    }

    document.getElementById("count").innerText =
        "Has trobat " + results.length + " paraules";
    document.getElementById("result").innerText =
        results.join(", ");
}

// --- ENTER key triggers solve ---
input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        solve();
    }
});
</script>
</body>
</html>
