<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Solucionari del paraulògic</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f6fa;
        }

        /* HERO IMAGE */
        .hero {
            height: 200px;
            background-image: url("header.png"); /* <-- your image */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        /* MAIN CARD */
        .container {
            background: white;
            margin: -50px auto 0 auto;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 500px;
            max-width: 90%;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #ec4a49;
        }

        p {
            color: #666;
        }

        input {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid #63bcca;
            margin-bottom: 15px;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: #ec4a49;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #63bcca;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #ec4a49;
        }

        #count {
            margin-top: 20px;
            font-weight: bold;
            color: #ec4a49;
        }

        #result {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .word {
            background: #63bcca;
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="hero">
    Solucionari del paraulògic
</div>

<div class="container">
    <p>Introdueix les lletres (la primera és la central)</p>

    <input id="letters" placeholder="ex: rosupd">
    <br>
    <button onclick="solve()">Resoldre</button>

    <p id="count"></p>
    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
